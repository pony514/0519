<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>MediaPipe 手部感應遊戲</title>
  <!-- 載入 MediaPipe 與 p5.js 函式庫 -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #222; color: white; font-family: sans-serif; }
    #canvas-container { position: relative; border-radius: 10px; border: 4px solid #444; overflow: hidden; }
    #ui { position: absolute; top: 10px; left: 10px; font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); z-index: 10; pointer-events: none; }
  </style>
</head>
<body>
  <h1>手部感應碰碰球</h1>
  <div id="canvas-container">
    <div id="ui">分數: <span id="score">0</span></div>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
